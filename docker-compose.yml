version: '3.8'

services:
  esfs-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esfs-vitrine
    ports:
      - "8090:80" # Map le port 8090 de votre machine vers le port 80 du conteneur (Nginx)
    restart: unless-stopped
    environment:
      - NODE_ENV=production
